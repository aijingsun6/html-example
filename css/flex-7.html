<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box {
      width: 450px;
      border: 2px dotted rgb(96 139 168);
      display: flex;
      flex-wrap: wrap;
      height: 300px;
      align-content: space-between;
      flex-direction: column;
    }

    .box>* {
      padding: 20px;
      border: 2px solid rgb(96 139 168);
      border-radius: 5px;
      background-color: rgb(96 139 168 / 0.2);
      flex: 1 1 100px;
    }

    .box div {
      background-color: rgb(96 139 168 / 0.2);
      border: 2px solid rgb(96 139 168);
      border-radius: 5px;
      padding: 20px;
    }
  </style>

</head>



<body>
  <div class="box">
    <div>一</div>
    <div>二</div>
    <div>三</div>
    <div>四</div>
    <div>五</div>
    <div>六</div>
    <div>七</div>
    <div>八</div>
  </div>
</body>

</html>

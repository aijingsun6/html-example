<!DOCTYPE html>
<html>

<head>
  <title>MathML Text Example</title>
</head>

<body>
  <math display="block">
    <mrow>
      <mo>(</mo>
      <mtable>
        <mtr>
          <mtd>
            <mi>a</mi>
          </mtd>
          <mtd>
            <mi>c</mi>
          </mtd>
          <mtd>
            <mn>0</mn>
          </mtd>
          <mtd>
            <msub>
              <mi>t</mi>
              <mi>x</mi>
            </msub>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mi>b</mi>
          </mtd>
          <mtd>
            <mi>d</mi>
          </mtd>
          <mtd>
            <mn>0</mn>
          </mtd>
          <mtd>
            <msub>
              <mi>t</mi>
              <mi>y</mi>
            </msub>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mn>0</mn>
          </mtd>
          <mtd>
            <mn>0</mn>
          </mtd>
          <mtd>
            <mn>1</mn>
          </mtd>
          <mtd>
            <mn>0</mn>
          </mtd>
        </mtr>
        <mtr>
          <mtd>
            <mn>0</mn>
          </mtd>
          <mtd>
            <mn>0</mn>
          </mtd>
          <mtd>
            <mn>0</mn>
          </mtd>
          <mtd>
            <mn>1</mn>
          </mtd>
        </mtr>
      </mtable>
      <mo>)</mo>
    </mrow>
  </math>
  <p></p>

  <math display="block">
    <mrow>
      <mrow>
        <mo>(</mo>
        <mfrac>
          <mi>a</mi>
          <mi>b</mi>
        </mfrac>
        <mo>)</mo>
      </mrow>
      <mo>=</mo>
      <mrow>
        <mo>{</mo>
        <mtable>
          <mtr>
            <mtd>
              <mn>1</mn>
            </mtd>
            <mtd>
              <mtext>如果&nbsp;</mtext>
              <mi>a</mi>
              <mtext>&nbsp;是模&nbsp;</mtext>
              <mi>p</mi>
              <mtext>&nbsp;的二次剩余且不是&nbsp;</mtext>
              <mi>p</mi>
              <mtext>&nbsp;的倍数&nbsp;</mtext>
              <mo>；</mo>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mo>−</mo>
              <mn>1</mn>
            </mtd>
            <mtd>
              <mtext>如果&nbsp;</mtext>
              <mi>a</mi>
              <mtext>&nbsp;是模&nbsp;</mtext>
              <mi>p</mi>
              <mtext>&nbsp;的非二次剩余&nbsp;</mtext>
              <mo>；</mo>
            </mtd>
          </mtr>
          <mtr>
            <mtd>
              <mn>0</mn>
            </mtd>
            <mtd>
              <mtext>如果&nbsp;</mtext>
              <mi>a</mi>
              <mtext>&nbsp;是&nbsp;</mtext>
              <mi>p</mi>
              <mtext>&nbsp;的倍数&nbsp;</mtext>
              <mo>。</mo>
            </mtd>
          </mtr>
        </mtable>
      </mrow>
    </mrow>
  </math>
</body>

</html>
